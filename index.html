<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0f1419;
      color: #e6edf3;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      background: #161b22;
    }
    #hud {
      display: flex;
      gap: 1.5rem;
      font-size: 0.95rem;
      color: #8b949e;
    }
    #hud strong { color: #58a6ff; }
    #msg {
      min-height: 1.25rem;
      font-size: 0.9rem;
      color: #f85149;
    }
    #help {
      font-size: 0.8rem;
      color: #6e7681;
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <h1>Snake</h1>
    <canvas id="game" width="400" height="400" aria-label="Snake game canvas"></canvas>
    <div id="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
    <div id="msg"></div>
    <p id="help">Arrows or WASD to move. Space to pause. Eat the dot. Crossing an edge wraps to the other side. Don’t run into yourself.</p>
  </div>

  <script>
    (function () {
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var scoreEl = document.getElementById("score");
      var bestEl = document.getElementById("best");
      var msgEl = document.getElementById("msg");

      var GRID = 20;
      var CELL = canvas.width / GRID;
      var TICK_MS = 110;

      var snake;
      var dir;
      var nextDir;
      var food;
      var score;
      var best = parseInt(localStorage.getItem("snakeBest") || "0", 10) || 0;
      var paused;
      var gameOver;
      var lastTick;

      bestEl.textContent = String(best);

      function randCell() {
        return {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID)
        };
      }

      function foodOnSnake(f) {
        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === f.x && snake[i].y === f.y) return true;
        }
        return false;
      }

      function spawnFood() {
        var f;
        do {
          f = randCell();
        } while (foodOnSnake(f));
        food = f;
      }

      function reset() {
        snake = [
          { x: 8, y: 10 },
          { x: 7, y: 10 },
          { x: 6, y: 10 }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        paused = false;
        gameOver = false;
        msgEl.textContent = "";
        scoreEl.textContent = "0";
        spawnFood();
        lastTick = performance.now();
      }

      function setMessage(text) {
        msgEl.textContent = text;
      }

      function opposite(a, b) {
        return a.x === -b.x && a.y === -b.y;
      }

      function wrapAxis(value) {
        return ((value % GRID) + GRID) % GRID;
      }

      function step() {
        dir = nextDir;
        var head = snake[0];
        var nh = {
          x: wrapAxis(head.x + dir.x),
          y: wrapAxis(head.y + dir.y)
        };

        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === nh.x && snake[i].y === nh.y) {
            gameOver = true;
            setMessage("You ran into yourself — Space to restart");
            return;
          }
        }

        snake.unshift(nh);

        if (nh.x === food.x && nh.y === food.y) {
          score += 1;
          scoreEl.textContent = String(score);
          if (score > best) {
            best = score;
            bestEl.textContent = String(best);
            localStorage.setItem("snakeBest", String(best));
          }
          spawnFood();
        } else {
          snake.pop();
        }
      }

      function draw() {
        ctx.fillStyle = "#161b22";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "#21262d";
        ctx.lineWidth = 1;
        for (var g = 0; g <= GRID; g++) {
          ctx.beginPath();
          ctx.moveTo(g * CELL + 0.5, 0);
          ctx.lineTo(g * CELL + 0.5, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, g * CELL + 0.5);
          ctx.lineTo(canvas.width, g * CELL + 0.5);
          ctx.stroke();
        }

        ctx.fillStyle = "#f85149";
        ctx.beginPath();
        ctx.arc(
          food.x * CELL + CELL / 2,
          food.y * CELL + CELL / 2,
          CELL * 0.35,
          0,
          Math.PI * 2
        );
        ctx.fill();

        for (var i = 0; i < snake.length; i++) {
          var seg = snake[i];
          var pad = 1;
          var hue = 48 + (i / Math.max(snake.length, 1)) * 14;
          ctx.fillStyle = i === 0 ? "#ffc107" : "hsl(" + hue + ", 78%, 48%)";
          ctx.fillRect(
            seg.x * CELL + pad,
            seg.y * CELL + pad,
            CELL - pad * 2,
            CELL - pad * 2
          );
        }

        if (paused && !gameOver) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#e6edf3";
          ctx.font = "bold 20px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("Paused", canvas.width / 2, canvas.height / 2);
          ctx.textAlign = "start";
          ctx.textBaseline = "alphabetic";
        }
      }

      function loop(now) {
        if (!paused && !gameOver) {
          while (now - lastTick >= TICK_MS) {
            lastTick += TICK_MS;
            step();
            if (gameOver) break;
          }
        }
        draw();
        requestAnimationFrame(loop);
      }

      document.addEventListener("keydown", function (e) {
        var key = e.key.toLowerCase();
        var nd = null;

        if (key === "arrowup" || key === "w") nd = { x: 0, y: -1 };
        else if (key === "arrowdown" || key === "s") nd = { x: 0, y: 1 };
        else if (key === "arrowleft" || key === "a") nd = { x: -1, y: 0 };
        else if (key === "arrowright" || key === "d") nd = { x: 1, y: 0 };
        else if (key === " " || key === "spacebar") {
          e.preventDefault();
          if (gameOver) {
            reset();
            return;
          }
          paused = !paused;
          if (!paused) lastTick = performance.now();
          return;
        }

        if (nd && !opposite(nd, dir)) {
          e.preventDefault();
          nextDir = nd;
        }
      });

      reset();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
